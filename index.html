<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KCNX OS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: "Segoe UI", sans-serif;
  background: black;
  color: white;
}

/* Boot Screen */
#boot {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* Logo */
#logo {
  font-size: 60px;
  letter-spacing: 8px;
  opacity: 0;
  transition: 2s;
}

#sub {
  font-size: 14px;
  opacity: 0;
  margin-top: 10px;
  letter-spacing: 2px;
  transition: 2s;
}

/* Desktop */
#desktop {
  display: none;
  width: 100vw;
  height: 100vh;
  background: linear-gradient(135deg,#0a0a0a,#1e1e2f);
}

/* Icons */
.icon {
  width: 80px;
  text-align: center;
  margin: 20px;
  cursor: pointer;
}

/* Taskbar */
#taskbar {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 45px;
  background: rgba(20,20,20,0.9);
  display: flex;
  align-items: center;
  padding: 0 10px;
}

/* Start */
#startBtn {
  background: #00ffcc;
  border: none;
  padding: 5px 15px;
  cursor: pointer;
}

/* Start Menu */
#startMenu {
  position: absolute;
  bottom: 50px;
  left: 10px;
  width: 200px;
  background: #111;
  display: none;
  padding: 10px;
}

/* Window */
.window {
  position: absolute;
  width: 500px;
  height: 300px;
  background: #1e1e2f;
  border-radius: 10px;
  top: 100px;
  left: 100px;
}

.titlebar {
  background: #00ffcc;
  padding: 5px;
  cursor: move;
}

.content {
  height: 260px;
}

/* Browser iframe */
iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>

<!-- Boot Screen -->
<div id="boot">
  <div id="logo">KCNX</div>
  <div id="sub">Kedlestone Cartes Normal Xenodocial</div>
</div>

<!-- Desktop -->
<div id="desktop">

  <!-- Icons -->
  <div class="icon" onclick="openApp('recycle')">🗑️<br>Recycle Bin</div>
  <div class="icon" onclick="openApp('browser')">🌐<br>Browser</div>

  <!-- Start Menu -->
  <div id="startMenu">
    <div onclick="openApp('browser')">Browser</div>
  </div>

  <!-- Taskbar -->
  <div id="taskbar">
    <button id="startBtn">Start</button>
  </div>

</div>

<!-- Audio -->
<audio id="bgAudio" src="https://files.catbox.moe/qmismt.mp3"></audio>

<script>

// Boot timing
setTimeout(()=>{
  document.getElementById("logo").style.opacity = 1;
  document.getElementById("sub").style.opacity = 1;
},6000);

setTimeout(()=>{
  document.getElementById("boot").style.opacity = 0;
},12000);

setTimeout(()=>{
  document.getElementById("boot").style.display = "none";
  document.getElementById("desktop").style.display = "block";

  // Play sound AFTER boot
  let audio = document.getElementById("bgAudio");
  audio.currentTime = 15; // jump to beep part
  audio.play().catch(()=>{});
},15000);


// Start Menu
document.getElementById("startBtn").onclick = ()=>{
  let m = document.getElementById("startMenu");
  m.style.display = m.style.display=="block"?"none":"block";
}


// Open Apps
function openApp(app){

  let win = document.createElement("div");
  win.className="window";

  let title = document.createElement("div");
  title.className="titlebar";
  title.innerText = app;

  let content = document.createElement("div");
  content.className="content";

  if(app=="recycle"){
    content.innerHTML = "<p style='padding:10px'>Recycle Bin is empty</p>";
  }

  if(app=="browser"){
    content.innerHTML = `
      <iframe src="https://example.com"></iframe>
    `;
  }

  win.appendChild(title);
  win.appendChild(content);
  document.getElementById("desktop").appendChild(win);

  drag(win,title);
}


// Drag system
function drag(win,bar){
  let x,y;

  bar.onmousedown = (e)=>{
    x = e.clientX - win.offsetLeft;
    y = e.clientY - win.offsetTop;

    document.onmousemove = (e)=>{
      win.style.left = (e.clientX - x)+"px";
      win.style.top = (e.clientY - y)+"px";
    }

    document.onmouseup = ()=>{
      document.onmousemove = null;
    }
  }
}


// Audio unlock (for browsers)
document.body.addEventListener("click", ()=>{
  let audio = document.getElementById("bgAudio");
  audio.play().catch(()=>{});
},{once:true});

</script>

</body>
</html>
